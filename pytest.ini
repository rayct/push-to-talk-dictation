[pytest]
# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Minimum Python version
minversion = 7.0

# Timeout for tests (seconds)
timeout = 300
timeout_method = thread

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -ra

# Coverage options
# Run with: pytest --cov=. --cov-report=html
[coverage:run]
source = .
omit =
    */venv/*
    */site-packages/*
    tests/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod

# Markers for test categorization
markers =
    unit: Unit tests
    integration: Integration tests
    installation: Installation tests
    performance: Performance tests
    slow: Tests that take a long time to run
    x11: Tests requiring X11 display
    audio: Tests requiring audio hardware
    keyboard: Tests requiring keyboard input
    mock: Tests using mocks and fixtures
    requires_env: Tests requiring specific environment
